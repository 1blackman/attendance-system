<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance System</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 20px rgba(0,0,0,.15);
            width:350px;
            text-align:center;
        }

        h1{
            color:#0078d4;
        }

        button{
            background:#0078d4;
            color:white;
            border:none;
            padding:15px;
            width:100%;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#005ea6;
        }

        #status{
            margin-top:20px;
            font-weight:bold;
        }

    </style>

</head>
<body>

<div class="card">

<h1>Attendance System</h1>

<p>اضغط الزر لتسجيل الحضور</p>

<button onclick="getLocation()">
تسجيل الحضور
</button>

<p id="status"></p>

</div>

<script>

function getLocation(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(success,error);

}else{

document.getElementById("status").innerHTML="المتصفح لا يدعم GPS";

}

}

function success(position){

let lat=position.coords.latitude;

let lng=position.coords.longitude;

document.getElementById("status").innerHTML=
"تم الحصول على الموقع ✅<br><br>Latitude: "+lat+"<br>Longitude: "+lng;

}

function error(){

document.getElementById("status").innerHTML="تم رفض الوصول للموقع ❌";

}

</script>

</body>
</html>
